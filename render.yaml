services:
  - type: web
    name: telery
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free          # change to "starter" ($7/mo) to avoid cold starts
    healthCheckPath: /health
    autoDeploy: true    # redeploy automatically on every push to main

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

      # Supabase public anon values — safe to commit (anon role, not service role)
      # Passed as Docker build args so Vite can embed them in the frontend bundle
      - key: VITE_SUPABASE_URL
        value: https://fqipdddaejahtdfzryth.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxaXBkZGRhZWphaHRkZnpyeXRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjcxODYsImV4cCI6MjA5NTEwMzE4Nn0.L8sna4YYlUAyoAeAQg8ITrKN3Az_1f5btAuNDbQHZqw
      - key: VITE_API_URL
        value: ""
      # Set to "true" once Stripe secrets are added to enable billing UI
      - key: VITE_BILLING_ENABLED
        value: "false"

      # Render assigns the URL from the service name: telery → https://telery.onrender.com
      # If Render picks a different URL (name taken), update this to match
      - key: FRONTEND_URL
        value: https://telery.onrender.com

      # Fill these in the Render dashboard — never commit real values
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
