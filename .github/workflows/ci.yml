name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Type-check both frontend and backend ──────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Check frontend types
        run: npx tsc --noEmit

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Check backend types
        run: npx tsc --noEmit
        working-directory: backend

  # ── Build the Docker image to catch any compile/bundle errors ─────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          # Cache layers between runs to keep CI fast
          cache-from: type=gha
          cache-to: type=gha,mode=max
